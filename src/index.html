<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Jogo de Adivinhação</title>
  </head>

  <body>
    <main class="game">
      <h1 class="game__title">Jogo de Adivinhação</h1>

      <!--SETUP-->
      <section class="game__setup" id="setup">
        <p style="margin-bottom: 15px">Quantos jogadores?</p>

        <button class="btn btn--primary" data-j="1">1 jogador</button>
        <button class="btn btn--primary" data-j="2">2 jogadores</button>
        <button class="btn btn--primary" data-j="3">3 jogadores</button>
        <button class="btn btn--primary" data-j="4">4 jogadores</button>

        <div id="selDif">
          <p>Escolha a dificuldade:</p>
          <button class="btn btn--primary" data-dif="fácil">Fácil</button>
          <button class="btn btn--primary" data-dif="médio">Médio</button>
          <button class="btn btn--primary" data-dif="difícil">Difícil</button>
        </div>
      </section>

      <!--Partida-->
      <section class="game__match" id="match">
        <h2 class="game__subtitle" id="subtitulo"></h2>

        <div class="placar" id="placar"></div>

        <input
          type="number"
          min="1"
          id="palpite"
          class="input"
          placeholder=" 1-?"
        />
        <button id="btnPalpite" class="btn btn--primary">Chutar</button>

        <div class="msg" id="mensagem"></div>
        <button id="reiniciar" class="btn btn--success" style="display: none">
          Jogar novamente
        </button>
      </section>
    </main>
  </body>
  <script src="js/utils.js"></script>
  <script type="module" src="js/game.js"></script>
  <script type="module" src="js/play.js"></script>
</html>
